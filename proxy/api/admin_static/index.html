<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Freeway Control Center</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">FW</div>
          <div>
            <h1>Freeway</h1>
            <p>Control Center</p>
          </div>
        </div>
        <nav id="sectionNav" class="section-nav" aria-label="Admin views"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
          <div id="topbarMeta" class="topbar-meta"></div>
        </header>

        <div id="adminViews" class="admin-views"></div>
      </main>

      <footer class="action-bar">
        <div class="action-meta">
          <strong id="dirtyState">No changes</strong>
          <span id="configPath"></span>
        </div>
        <div id="messageArea" class="message-area"></div>
        <div id="actionBarButtons" class="action-buttons">
          <button id="validateButton" class="secondary-button" type="button">Validate</button>
          <button id="applyButton" class="primary-button" type="button" disabled>Apply</button>
        </div>
      </footer>
    </div>
    <script src="/admin/assets/admin.js"></script>
  </body>
</html>
